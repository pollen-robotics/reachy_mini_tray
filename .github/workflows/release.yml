name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.2.0). Used to set tauri.conf.json#version when not running on a tag.'
        required: false
        type: string
      dry_run:
        description: 'Dry run - build everything and upload as workflow artifacts but do not create a GitHub Release.'
        required: false
        type: boolean
        default: false
      desktop_app_ref:
        description: 'Git ref of pollen-robotics/reachy-mini-desktop-app to check out for uv-wrapper (default: develop).'
        required: false
        type: string
        default: 'develop'

# Build + sign + release via the official `tauri-apps/tauri-action`.
#
# Why tauri-action (vs the hand-rolled workflow the desktop app uses): the
# desktop app forces a manual pipeline because it drives Apple keychain import
# + notarization + a bespoke `latest.json` merge in a specific order. The tray
# does NOT have that constraint - it bakes no Python into the bundle (the venv
# is created at first-run on the user's machine), so the only pre-build step is
# compiling the `uv-trampoline` sidecar. That happens as a normal step BEFORE
# tauri-action, and `externalBin` picks it up from disk. tauri-action then does
# build -> sign -> (notarize) -> create release -> generate & upload latest.json
# in one step (`uploadUpdaterJson: true`, merged across the matrix).
#
# Signing status (see docs/known-edge-cases.md):
#   - Updater artifacts: always signed with the minisign key
#     `TAURI_SIGNING_PRIVATE_KEY` (repo secret, no password).
#   - macOS bundle: real Developer ID + notarization when the APPLE_* secrets
#     are present (planned once the repo moves under `pollen`); until then a
#     `signingIdentity: "-"` ad-hoc fallback keeps auto-update working (the
#     updater can relaunch the swapped app; only the first manual install needs
#     right-click > Open).
#   - Windows bundle: currently unsigned (SmartScreen warning on first install);
#     Authenticode to be wired at the pollen migration.

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-aarch64
            shell: bash
          # macos-15-intel keeps native x86_64 builds available until Aug 2027,
          # which is the same approach reachy_mini_desktop_app takes.
          - os: macos-15-intel
            target: x86_64-apple-darwin
            platform: darwin-x86_64
            shell: bash
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            shell: pwsh
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            shell: bash

    runs-on: ${{ matrix.os }}

    steps:
      - name: Dry run notice
        if: github.event.inputs.dry_run == 'true'
        shell: bash
        run: |
          echo "🧪 DRY RUN MODE: artifacts will be uploaded to the Actions run"
          echo "🧪 but no GitHub Release will be created."

      - name: Checkout reachy_mini_tray
        uses: actions/checkout@v4
        with:
          path: reachy_mini_tray

      - name: Checkout reachy-mini-desktop-app (for uv-wrapper)
        uses: actions/checkout@v4
        with:
          repository: pollen-robotics/reachy-mini-desktop-app
          ref: ${{ github.event.inputs.desktop_app_ref || 'develop' }}
          path: reachy_mini_desktop_app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            reachy_mini_tray/src-tauri -> target
            reachy_mini_desktop_app/uv-wrapper -> target
          shared-key: release-${{ matrix.target }}

      - name: Ensure Rust target is installed
        shell: bash
        run: |
          rustup target add ${{ matrix.target }}
          rustup target list --installed

      - name: Install Linux Tauri dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgdk-pixbuf2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libglib2.0-dev \
            libxdo-dev \
            libudev-dev \
            libssl-dev \
            build-essential \
            pkg-config \
            file \
            dpkg-dev \
            libfuse2t64 \
            squashfs-tools \
            patchelf

      - name: Install npm dependencies
        shell: bash
        working-directory: reachy_mini_tray
        run: npm install

      - name: Extract version
        id: version
        shell: bash
        working-directory: reachy_mini_tray
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$VERSION" = "$GITHUB_REF" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | head -1 | cut -d'"' -f4)
          fi
          if [ -z "$VERSION" ]; then
            echo "❌ Could not determine version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ Resolved version: $VERSION"

      - name: Update version in tauri.conf.json
        shell: bash
        working-directory: reachy_mini_tray
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          else
            sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
            rm -f src-tauri/tauri.conf.json.bak
          fi
          grep '"version"' src-tauri/tauri.conf.json | head -1

      - name: Build sidecar (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        working-directory: reachy_mini_tray
        env:
          UV_WRAPPER_DIR: ${{ github.workspace }}/reachy_mini_desktop_app/uv-wrapper
          TARGET_TRIPLET: ${{ matrix.target }}
        run: bash ./scripts/build-sidecar.sh

      - name: Build sidecar (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        working-directory: reachy_mini_tray
        env:
          UV_WRAPPER_DIR: ${{ github.workspace }}\reachy_mini_desktop_app\uv-wrapper
          TARGET_TRIPLET: ${{ matrix.target }}
        run: |
          pwsh -File .\scripts\build-sidecar.ps1
          $sidecar = "src-tauri\binaries\uv-trampoline-${{ matrix.target }}.exe"
          if (-not (Test-Path $sidecar)) {
            Write-Error "❌ Sidecar binary not found: $sidecar"
            Get-ChildItem src-tauri\binaries\
            exit 1
          }
          Write-Host "✅ Sidecar built: $sidecar"

      - name: Configure macOS signing
        # Decide macOS signing mode from the secrets and set it up accordingly.
        # CRITICAL: Tauri's bundler treats a *present but empty* APPLE_CERTIFICATE
        # as "import this cert" and runs `security import` with empty data, which
        # fails ("SecKeychainItemImport: parameters were not valid"). So the
        # APPLE_* vars must be left UNDEFINED (not empty) when we ad-hoc sign.
        if: startsWith(matrix.os, 'macos')
        shell: bash
        working-directory: reachy_mini_tray
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            echo "✅ Apple Developer ID configured -> real signing + notarization."
            # Promote the secrets to the job env so the tauri-action step (and
            # Tauri's bundler) can import the cert + notarize.
            {
              echo "APPLE_CERTIFICATE=$APPLE_CERTIFICATE"
              echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
              echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
              echo "APPLE_ID=$APPLE_ID"
              echo "APPLE_PASSWORD=$APPLE_PASSWORD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
            exit 0
          fi
          echo "⚠️  No APPLE_SIGNING_IDENTITY secret -> ad-hoc signing (signingIdentity '-')."
          echo "    Auto-update works; the first manual install needs right-click > Open."
          # Ad-hoc needs no certificate, so we do NOT export any APPLE_* here.
          python3 - <<'PY'
          import json, pathlib
          p = pathlib.Path("src-tauri/tauri.conf.json")
          conf = json.loads(p.read_text())
          conf.setdefault("bundle", {}).setdefault("macOS", {})["signingIdentity"] = "-"
          p.write_text(json.dumps(conf, indent=2) + "\n")
          print("Injected bundle.macOS.signingIdentity = '-'")
          PY

      - name: Build, sign and release (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # AppImage tools rely on FUSE which isn't available on the runner;
          # APPIMAGE_EXTRACT_AND_RUN tells them to self-extract instead.
          APPIMAGE_EXTRACT_AND_RUN: 1
          # Updater artifact signing (minisign). The key has no password; the
          # var must still be present (empty) so the signer runs non-interactively.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
          # Apple signing/notarization vars are injected into $GITHUB_ENV by the
          # "Configure macOS signing" step ONLY when the secrets exist, so they
          # are absent (not empty) during ad-hoc builds.
        with:
          projectPath: reachy_mini_tray
          args: --target ${{ matrix.target }}
          # Create/upload to the GitHub Release only on a real tag push that is
          # not a dry run. Otherwise tagName is empty -> tauri-action only builds
          # (no release touched); the inspection artifacts are uploaded below.
          tagName: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && github.event.inputs.dry_run != 'true') && github.ref_name || '' }}
          releaseName: 'Reachy Mini Tray v${{ steps.version.outputs.version }}'
          releaseDraft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          generateReleaseNotes: true
          # Build + attach the updater manifest (latest.json), merged across the
          # matrix, and prefer the NSIS setup.exe for the Windows entry. When a
          # release is created (tag push) it is uploaded there automatically.
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

      - name: Upload bundle artifacts (inspection)
        # tauri-action has no built-in workflow-artifact upload, so mirror the
        # produced bundles + updater signatures here. Handy for dry runs (verify
        # the `.sig` files exist) and for grabbing a build without a release.
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}
          path: |
            reachy_mini_tray/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            reachy_mini_tray/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
            reachy_mini_tray/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            reachy_mini_tray/src-tauri/target/${{ matrix.target }}/release/bundle/**/*setup.exe
            reachy_mini_tray/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.nsis.zip
            reachy_mini_tray/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            reachy_mini_tray/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            reachy_mini_tray/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sig
          if-no-files-found: warn
          retention-days: 14
