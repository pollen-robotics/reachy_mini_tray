<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reachy Mini - Update</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --bg-elev: #fafafa;
        --fg: #1c1c1e;
        --fg-dim: #6c6c70;
        --fg-faint: #8e8e93;
        --accent: #0a84ff;
        --success: #34c759;
        --error: #ef4444;
        --divider: rgba(60, 60, 67, 0.12);
        --track: rgba(120, 120, 128, 0.18);
        --chip-bg: rgba(10, 132, 255, 0.1);
        --chip-fg: #0a84ff;
        --btn-fg: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1c1c1e;
          --bg-elev: #232325;
          --fg: #f2f2f7;
          --fg-dim: #a1a1a6;
          --fg-faint: #6e6e73;
          --divider: rgba(255, 255, 255, 0.08);
          --track: rgba(120, 120, 128, 0.32);
          --chip-bg: rgba(10, 132, 255, 0.18);
          --chip-fg: #4ea1ff;
          --error: #f87171;
        }
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 13px;
        -webkit-font-smoothing: antialiased;
        user-select: none;
        -webkit-user-select: none;
      }

      main {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 26px 28px 22px;
        gap: 18px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .header-icon {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), #5e5ce6);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
      }
      .header-icon svg {
        width: 21px;
        height: 21px;
        color: #fff;
      }
      .header-text {
        flex: 1;
        min-width: 0;
      }
      h1 {
        margin: 0 0 2px;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.2px;
      }
      .subtitle {
        margin: 0;
        color: var(--fg-dim);
        font-size: 12px;
        line-height: 1.4;
      }

      .version-card {
        background: var(--bg-elev);
        border: 1px solid var(--divider);
        border-radius: 10px;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        font-variant-numeric: tabular-nums;
      }
      .version-pill {
        font-size: 13px;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--track);
        color: var(--fg-dim);
      }
      .version-pill.new {
        background: var(--chip-bg);
        color: var(--chip-fg);
      }
      .arrow {
        color: var(--fg-faint);
        font-size: 15px;
      }

      .notes {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        color: var(--fg-dim);
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
        scrollbar-width: thin;
      }
      .notes:empty {
        display: none;
      }

      .progress-track {
        position: relative;
        width: 100%;
        height: 5px;
        background: var(--track);
        border-radius: 999px;
        overflow: hidden;
        display: none;
      }
      .progress-track.visible {
        display: block;
      }
      .progress-bar {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: var(--p, 0%);
        background: var(--accent);
        border-radius: 999px;
        transition: width 0.2s ease-out;
      }
      .progress-track.indeterminate .progress-bar {
        width: 35% !important;
        animation: slide 1.6s ease-in-out infinite;
        transition: none;
      }
      @keyframes slide {
        0% {
          transform: translateX(-100%);
        }
        50% {
          transform: translateX(220%);
        }
        100% {
          transform: translateX(-100%);
        }
      }

      .status-line {
        font-size: 11.5px;
        color: var(--fg-faint);
        text-align: center;
        min-height: 14px;
      }
      .status-line.error {
        color: var(--error);
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      button {
        appearance: none;
        border: none;
        border-radius: 9px;
        padding: 11px 16px;
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: opacity 0.15s ease, background-color 0.15s ease;
      }
      .btn-primary {
        background: var(--accent);
        color: var(--btn-fg);
      }
      .btn-primary:hover {
        opacity: 0.9;
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="header">
        <div class="header-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v12" />
            <path d="M7 10l5 5 5-5" />
            <path d="M5 21h14" />
          </svg>
        </div>
        <div class="header-text">
          <h1>Update available</h1>
          <p class="subtitle">A new version of Reachy Mini Tray is ready to install.</p>
        </div>
      </div>

      <section class="version-card">
        <span class="version-pill" id="current-version">&hellip;</span>
        <span class="arrow" aria-hidden="true">&rarr;</span>
        <span class="version-pill new" id="new-version">&hellip;</span>
      </section>

      <div class="notes" id="notes"></div>

      <div class="progress-track" id="track">
        <div class="progress-bar" id="bar"></div>
      </div>

      <div class="status-line" id="status"></div>

      <div class="actions">
        <button class="btn-primary" id="install-btn">Install and restart</button>
      </div>
    </main>

    <script>
      // The update overlay is a thin presentational layer over the Rust
      // `app_update` module. It:
      //   - pulls the pending version via `get_app_update_info` on load
      //     (and listens to `app-update:available` in case it opened first),
      //   - triggers `install_app_update` on button click,
      //   - reflects `app-update:progress` on the bar and `app-update:error`
      //     in the status line.
      // On success the Rust side relaunches the app, so this window just
      // vanishes with the process - no explicit "done" handling needed.
      const tauri = window.__TAURI__;

      const currentEl = document.getElementById("current-version");
      const newEl = document.getElementById("new-version");
      const notesEl = document.getElementById("notes");
      const track = document.getElementById("track");
      const bar = document.getElementById("bar");
      const statusEl = document.getElementById("status");
      const installBtn = document.getElementById("install-btn");

      let installing = false;

      function applyInfo(info) {
        if (!info) return;
        if (info.current) currentEl.textContent = "v" + info.current;
        if (info.version) newEl.textContent = "v" + info.version;
        if (info.notes && info.notes.trim().length > 0) {
          notesEl.textContent = info.notes.trim();
        }
      }

      function setStatus(text, isError) {
        statusEl.textContent = text || "";
        statusEl.classList.toggle("error", !!isError);
      }

      async function loadInfo() {
        if (!tauri?.core?.invoke) return;
        try {
          const info = await tauri.core.invoke("get_app_update_info");
          applyInfo(info);
        } catch (e) {
          console.warn("get_app_update_info failed", e);
        }
      }

      function onProgress(payload) {
        track.classList.add("visible");
        if (payload && typeof payload.percent === "number") {
          track.classList.remove("indeterminate");
          bar.style.setProperty("--p", payload.percent + "%");
          setStatus("Downloading\u2026 " + payload.percent + "%");
        } else {
          // No content-length: show an indeterminate sweep.
          track.classList.add("indeterminate");
          setStatus("Downloading\u2026");
        }
      }

      async function install() {
        if (installing || !tauri?.core?.invoke) return;
        installing = true;
        installBtn.disabled = true;
        installBtn.textContent = "Installing\u2026";
        track.classList.add("visible", "indeterminate");
        setStatus("Preparing download\u2026");
        try {
          await tauri.core.invoke("install_app_update");
          // On success the app relaunches; if we're still here, keep the
          // "installing" state - the restart is imminent.
          setStatus("Restarting\u2026");
        } catch (e) {
          installing = false;
          installBtn.disabled = false;
          installBtn.textContent = "Retry install";
          track.classList.remove("visible", "indeterminate");
          setStatus(String(e && e.message ? e.message : e), true);
        }
      }

      installBtn.addEventListener("click", install);

      if (tauri?.event?.listen) {
        tauri.event
          .listen("app-update:available", (evt) => applyInfo(evt.payload))
          .catch((err) => console.warn("listen(app-update:available) failed", err));
        tauri.event
          .listen("app-update:progress", (evt) => onProgress(evt.payload))
          .catch((err) => console.warn("listen(app-update:progress) failed", err));
        tauri.event
          .listen("app-update:error", (evt) => {
            installing = false;
            installBtn.disabled = false;
            installBtn.textContent = "Retry install";
            track.classList.remove("visible", "indeterminate");
            setStatus(String(evt.payload), true);
          })
          .catch((err) => console.warn("listen(app-update:error) failed", err));
      }

      loadInfo();
    </script>
  </body>
</html>
